<p>task-list works!</p>
<h2>Tasks</h2>
<div *ngFor="let task of tasks" class="card mb-2 p-2">
    <h5>{{task.title}}</h5>
    <p>Status: {{task.status}} | Priority: {{task.priority}}</p>
    <a [routerLink]="['/task', task.id]" class="btn btn-primary btn-sm">View</a>      
    <button class="btn btn-danger btn-sm ms-2" (click)="delete(task.id)">Delete</button>
</div>
