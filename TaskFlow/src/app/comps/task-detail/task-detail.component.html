<h3>Task Detail</h3>
<ng-container *ngIf="task; else noTask">
  <h4>{{task.title}}</h4>
  <p>{{task.description}}</p>
  <p>Due: {{task.dueDate}}</p>
  <p>Status: {{task.status}}</p>
  <p>Priority: {{task.priority}}</p>
  <a [routerLink]="['edit']" class="btn btn-warning mb-2">Edit</a>
</ng-container>
<ng-template #noTask>
  <p class="text-danger">Task not found.</p>
</ng-template>
<router-outlet></router-outlet>
